          description: Bad Request
          schema:
            $ref: '#/definitions/response.ApiResponse'
      security:
      - AdminJWT: []
      summary: List settings
      tags:
      - Admin Settings
    put:
      consumes:
      - application/json
      description: |-
        Batch insert/update settings. Returns per-key status.
        Supported groups: brand, rate, system, epay.
        epay group keys: epay.default_token (e.g. "usdt"), epay.default_currency (e.g. "cny"), epay.default_network (e.g. "tron").
        rate group keys: rate.forced_usdt_rate (>0 overrides USDT/CNY; <=0 uses rate.api_url), rate.api_url, rate.adjust_percent, rate.okx_c2c_enabled.
        brand group keys: brand.site_name, brand.logo_url, brand.page_title, brand.pay_success_text, brand.support_url.
        system group keys: system.order_expiration_time.
      parameters:
      - description: Settings payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/admin.SettingsUpsertRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/response.ApiResponse'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/admin.SettingsUpsertResult'
                  type: array
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.ApiResponse'
      security:
      - AdminJWT: []
      summary: Upsert settings
      tags:
      - Admin Settings
