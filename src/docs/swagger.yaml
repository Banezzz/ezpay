      callback_confirm:
        description: 回调确认状态 1=回调成功 2=未回调/回调失败
        enum:
        - 1
        - 2
        example: 2
        type: integer
      callback_num:
        example: 0
        type: integer
      created_at:
        example: "2026-04-16 12:00:00"
        type: string
      currency:
        example: CNY
        type: string
      deleted_at:
        $ref: '#/definitions/gorm.DeletedAt'
      id:
        example: 1
        type: integer
      is_selected:
        example: false
        type: boolean
      name:
        example: VIP月卡
        type: string
      network:
        example: tron
        type: string
      notify_url:
        example: https://example.com/notify
        type: string
      order_id:
        example: ORD20260416001
        type: string
      parent_trade_id:
        type: string
      pay_by_sub_id:
        description: |-
          PayBySubId holds the primary-key ID of the sub-order that settled this parent order.
