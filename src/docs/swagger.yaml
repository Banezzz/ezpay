    type: object
  admin.UpdateChainRequest:
    properties:
      display_name:
        example: Tron
        type: string
      enabled:
        example: true
        type: boolean
      min_confirmations:
        example: 20
        type: integer
      scan_interval_sec:
        example: 5
        type: integer
    type: object
  admin.UpdateChainTokenRequest:
    properties:
      contract_address:
        example: TR7NHqjeKQxGTCi8q8ZY4pL8otSzgjLj6t
        type: string
      decimals:
        example: 6
