        example: "2026-04-16 12:00:00"
        type: string
      deleted_at:
        $ref: '#/definitions/gorm.DeletedAt'
      enabled:
        example: true
        type: boolean
      events:
        example: '{"pay_success":true,"order_expired":true}'
        type: string
      id:
        example: 1
        type: integer
      name:
        example: 主通知群
        type: string
      type:
        enum:
        - telegram
        - webhook
        - email
        example: telegram
        type: string
      updated_at:
        example: "2026-04-16 12:00:00"
        type: string
