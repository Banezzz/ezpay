      token:
        description: 币种 如：usdt
        example: usdt
        type: string
    required:
    - currency
    - network
    - notify_url
    - signature
    - token
    type: object
  request.SwitchNetworkRequest:
    properties:
      network:
        example: ethereum
        type: string
      token:
        example: USDT
        type: string
      trade_id:
        example: T2026041612345678
        type: string
    required:
    - network
    - token
    - trade_id
    type: object
  response.ApiResponse:
    properties:
      data: {}
      message:
        example: success
        type: string
      request_id:
        example: req-123456
        type: string
      status_code:
        example: 200
        type: integer
    type: object
  response.CheckStatusResponse:
    properties:
      status:
        description: 订单状态 1=等待支付 2=支付成功 3=已过期
        enum:
        - 1
        - 2
        - 3
        example: 1
        type: integer
      trade_id:
        description: ezpay订单号
        example: T2026041612345678
        type: string
    type: object
  response.CheckoutCounterResponse:
    properties:
      actual_amount:
        description: 订单实际需要支付的金额，保留4位小数 加密货币金额
        example: 14.2857
        type: number
      amount:
        description: 订单金额，保留4位小数 法币金额
        example: 100
        type: number
      created_at:
        description: 订单创建时间 时间戳
        example: 1713264000
        type: integer
      currency:
        description: 法币币种 CNY USD ...
        example: CNY
        type: string
      expiration_time:
        description: 过期时间 时间戳
        example: 1713264600
        type: integer
      is_selected:
        example: false
        type: boolean
      network:
        description: 网络 TRON ETH ...
        example: tron
        type: string
      receive_address:
        description: 收款钱包地址
        example: TTestTronAddress001
        type: string
      redirect_url:
        example: https://example.com/success
        type: string
      token:
        description: 所属币种 TRX USDT......
        example: USDT
        type: string
      trade_id:
        description: ezpay订单号
        example: T2026041612345678
        type: string
    type: object
  response.CreateTransactionResponse:
    properties:
      actual_amount:
        description: 订单实际需要支付的金额，保留4位小数
        example: 14.2857
        type: number
      amount:
        description: 订单金额，保留4位小数
        example: 100
        type: number
      currency:
        description: 订单货币类型 CNY USD......
        example: CNY
        type: string
      expiration_time:
        description: 过期时间 时间戳
        example: 1713264600
        type: integer
      order_id:
        description: 客户交易id
        example: ORD20260416001
        type: string
      payment_url:
        description: 收银台地址
        example: https://pay.example.com/checkout/T2026041612345678
        type: string
      receive_address:
        description: 收款钱包地址
        example: TTestTronAddress001
        type: string
      token:
        description: 所属币种 TRX USDT......
        example: USDT
        type: string
      trade_id:
        description: ezpay订单号
        example: T2026041612345678
        type: string
    type: object
  response.NetworkTokenSupport:
    properties:
      network:
        example: tron
        type: string
      tokens:
        example:
        - USDT
        - USDC
        items:
          type: string
        type: array
    type: object
  response.SupportedAssetsResponse:
    properties:
      supports:
        items:
          $ref: '#/definitions/response.NetworkTokenSupport'
        type: array
    type: object
