    get:
      description: |-
        Returns all settings, optionally filtered by group.
        Available groups: brand, rate, system, epay.
        See SettingUpsertItem for the full list of supported keys per group.
      parameters:
      - description: Group filter (brand|rate|system|epay)
        in: query
        name: group
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
