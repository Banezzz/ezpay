        type: string
      notify_url:
        example: https://example.com/notify
        type: string
      pid:
        example: "1000"
        type: string
      status:
        description: 状态 1=启用 2=禁用
        enum:
        - 1
        - 2
        example: 1
        type: integer
      updated_at:
        example: "2026-04-16 12:00:00"
        type: string
    type: object
  mdb.Chain:
    properties:
      created_at:
        example: "2026-04-16 12:00:00"
        type: string
      deleted_at:
        $ref: '#/definitions/gorm.DeletedAt'
      display_name:
        example: Tron
