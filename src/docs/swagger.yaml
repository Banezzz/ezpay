definitions:
  admin.AdminAddWalletRequest:
    properties:
      address:
        example: TTestTronAddress001
        type: string
      network:
        example: tron
        type: string
      remark:
        example: 主钱包
        type: string
    required:
    - address
    - network
    type: object
  admin.AdminBatchDeleteWalletsRequest:
    properties:
      ids:
        example:
        - 1
        - 2
        - 3
        items:
          type: integer
        type: array
    required:
    - ids
    type: object
  admin.AdminBatchImportRequest:
    properties:
      addresses:
        description: Addresses listed as observation-only wallets.
        example:
        - TAddr001
        - TAddr002
        - TAddr003
        items:
          type: string
        type: array
      network:
        example: tron
        type: string
    required:
    - addresses
    - network
    type: object
  admin.AdminChangeWalletStatusRequest:
    properties:
      status:
        description: 状态 1=启用 2=禁用
        enum:
        - 1
        - 2
        example: 1
        type: integer
    type: object
  admin.AdminUpdateWalletRequest:
    properties:
      remark:
        example: 已更新的备注
        type: string
    type: object
  admin.ApiKeyStatsResponse:
    properties:
      call_count:
        example: 342
        type: integer
      last_used_at:
        example: "2026-04-14T08:30:00+00:00"
        type: string
    type: object
  admin.BatchImportResult:
    properties:
      address:
        example: TTestTronAddress001
        type: string
      error:
        example: ""
        type: string
      ok:
        example: true
        type: boolean
    type: object
  admin.ChangeApiKeyStatusRequest:
    properties:
      status:
        description: 状态 1=启用 2=禁用
        enum:
        - 1
        - 2
        example: 1
        type: integer
    type: object
  admin.ChangeChainTokenStatusRequest:
    properties:
      enabled:
        example: true
        type: boolean
    type: object
  admin.ChangeChannelStatusRequest:
    properties:
      enabled:
        example: true
        type: boolean
    type: object
  admin.ChangePasswordRequest:
    properties:
      new_password:
        example: new_pass123
        type: string
      old_password:
        example: old_pass
        type: string
    required:
    - old_password
    type: object
  admin.CreateApiKeyRequest:
    properties:
      ip_whitelist:
        example: ""
        type: string
      name:
        example: My API Key
        type: string
      notify_url:
        example: https://example.com/notify
        type: string
    type: object
  admin.CreateApiKeyResponse:
    properties:
      id:
        example: 1
        type: integer
      name:
        example: My API Key
        type: string
      pid:
        example: "1003"
        type: string
      secret_key:
        description: |-
          SecretKey is returned ONCE on creation. After that, fetch via
          GET /api-keys/:id/secret or rotate to generate a new one.
        example: secret123abc456
        type: string
    type: object
  admin.CreateChainTokenRequest:
    properties:
      contract_address:
        example: TR7NHqjeKQxGTCi8q8ZY4pL8otSzgjLj6t
        type: string
      decimals:
        example: 6
        type: integer
      enabled:
        example: true
        type: boolean
      min_amount:
        example: 1
        type: number
      network:
        example: tron
        type: string
      symbol:
        example: USDT
        type: string
    required:
    - network
    type: object
  admin.CreateNotificationChannelRequest:
    properties:
      config:
        additionalProperties: true
        type: object
      enabled:
        example: true
        type: boolean
      events: {}
      name:
        example: 主通知群
        type: string
      type:
        enum:
        - telegram
        - webhook
        - email
        example: telegram
        type: string
    required:
    - config
    type: object
  admin.CreateRpcNodeRequest:
    properties:
      api_key:
        example: ""
        type: string
      enabled:
        example: true
        type: boolean
      network:
        example: tron
        type: string
      type:
        description: 连接类型 http=HTTP请求 ws=WebSocket长连接
        enum:
        - http
        - ws
        example: http
        type: string
      url:
        example: https://api.trongrid.io
        type: string
      weight:
        example: 1
        type: integer
    required:
    - network
    - url
    type: object
  admin.InitialPasswordResponse:
    properties:
      password:
        example: a1b2c3d4e5f6
        type: string
      username:
        example: admin
        type: string
    type: object
  admin.LoginRequest:
    properties:
      password:
        example: password123
        type: string
      username:
        example: admin
        type: string
    required:
    - password
    - username
    type: object
  admin.LoginResponse:
    properties:
      token:
        example: eyJhbGciOiJIUzI1NiIs...
        type: string
      user_id:
        example: 1
        type: integer
      username:
        example: admin
        type: string
    type: object
  admin.MarkPaidRequest:
    properties:
      block_transaction_id:
        example: 0xabc123def456...
        type: string
    required:
    - block_transaction_id
    type: object
  admin.MeResponse:
    properties:
      created_at:
        example: "2026-04-16 12:00:00"
        type: string
      deleted_at:
        $ref: '#/definitions/gorm.DeletedAt'
      id:
        example: 1
        type: integer
      last_login_at:
        example: "2026-04-16 12:00:00"
        type: string
      password_is_default:
        example: true
        type: boolean
      status:
        description: 状态 1=启用 2=禁用
        enum:
        - 1
        - 2
        example: 1
        type: integer
      updated_at:
        example: "2026-04-16 12:00:00"
        type: string
      username:
        example: admin
        type: string
    type: object
  admin.OrderListResponse:
    properties:
      list:
        items:
          $ref: '#/definitions/mdb.Orders'
        type: array
      page:
        example: 1
        type: integer
      page_size:
        example: 20
        type: integer
      total:
        example: 100
        type: integer
    type: object
  admin.OrderStatsResponse:
    properties:
      avg_payment_seconds:
        example: 120.5
        type: number
      expired_unpaid_count:
        example: 10
        type: integer
      order_count:
        example: 100
        type: integer
      success_count:
        example: 85
        type: integer
      success_rate:
        example: 0.85
        type: number
    type: object
  admin.OrderWithSub:
    properties:
      actual_amount:
        example: 14.2857
        type: number
      amount:
        example: 100
        type: number
      api_key_id:
        example: 1
        type: integer
      block_transaction_id:
        example: 0xabc123...
        type: string
      callback_confirm:
        description: 回调确认状态 1=回调成功 2=未回调/回调失败
        enum:
        - 1
        - 2
        example: 2
        type: integer
      callback_num:
        example: 0
        type: integer
      created_at:
        example: "2026-04-16 12:00:00"
        type: string
      currency:
        example: CNY
        type: string
      deleted_at:
        $ref: '#/definitions/gorm.DeletedAt'
      id:
        example: 1
        type: integer
      is_selected:
        example: false
        type: boolean
      name:
        example: VIP月卡
        type: string
      network:
        example: tron
        type: string
      notify_url:
        example: https://example.com/notify
        type: string
      order_id:
        example: ORD20260416001
        type: string
      parent_trade_id:
        type: string
      pay_by_sub_id:
        description: |-
          PayBySubId holds the primary-key ID of the sub-order that settled this parent order.
          Zero when the parent order was paid directly (no sub-order involved).
        example: 0
        type: integer
      payment_type:
        example: Epay
        type: string
      receive_address:
        example: TTestTronAddress001
        type: string
      redirect_url:
        example: https://example.com/success
        type: string
      status:
        description: 订单状态 1=等待支付 2=支付成功 3=已过期
        enum:
        - 1
        - 2
        - 3
        example: 1
        type: integer
      sub_orders:
        items:
          $ref: '#/definitions/mdb.Orders'
        type: array
      token:
        example: USDT
        type: string
      trade_id:
        example: T2026041612345678
        type: string
      updated_at:
        example: "2026-04-16 12:00:00"
        type: string
    type: object
  admin.OrderWithSubListResponse:
    properties:
      list:
        items:
          $ref: '#/definitions/admin.OrderWithSub'
        type: array
      page:
        example: 1
        type: integer
      page_size:
        example: 20
        type: integer
      total:
        example: 100
        type: integer
    type: object
  admin.OverviewResponse:
    properties:
      active_addresses:
        example: 5
        type: integer
      online_chains:
        example: 3
        type: integer
      order_count:
        example: 42
        type: integer
      seven_day_volume:
        example: 700.25
        type: number
      success_rate:
        example: 0.85
        type: number
      total_asset:
        example: 12345.6789
        type: number
      volume:
        example: 100.5
        type: number
    type: object
  admin.RotateSecretResponse:
    properties:
      secret_key:
        example: newSecret123abc456
        type: string
    type: object
  admin.RpcHealthCheckResponse:
    properties:
      last_latency_ms:
        example: 120
        type: integer
      status:
        description: 健康状态 unknown=未知 ok=正常 down=异常
        enum:
        - unknown
        - ok
        - down
        example: ok
        type: string
    type: object
  admin.SettingUpsertItem:
    properties:
      group:
        enum:
        - brand
        - rate
        - system
        - epay
        example: epay
        type: string
      key:
        example: epay.default_network
        type: string
      type:
        enum:
        - string
        - int
        - bool
        - json
        example: string
        type: string
      value:
        example: tron
        type: string
    type: object
  admin.SettingsUpsertRequest:
    properties:
      items:
        items:
          $ref: '#/definitions/admin.SettingUpsertItem'
        type: array
    required:
    - items
    type: object
  admin.SettingsUpsertResult:
    properties:
      error:
        example: ""
        type: string
      key:
        example: rate.api_url
        type: string
      ok:
        example: true
        type: boolean
    type: object
  admin.UpdateApiKeyRequest:
    properties:
      ip_whitelist:
        example: 10.0.0.1,192.168.0.0/24
