  admin.UpdateNotificationChannelRequest:
    properties:
      config:
        additionalProperties: true
        type: object
      enabled:
        example: true
        type: boolean
      events: {}
      name:
        example: 更新后的名称
        type: string
    type: object
  admin.UpdateRpcNodeRequest:
    properties:
      api_key:
        example: your-api-key
        type: string
      enabled:
        example: true
        type: boolean
      url:
        example: https://api.trongrid.io
        type: string
      weight:
        example: 1
        type: integer
    type: object
  admin.WalletListItem:
    properties:
      address:
        example: TTestTronAddress001
        type: string
      created_at:
        example: "2026-04-16 12:00:00"
        type: string
      deleted_at:
        $ref: '#/definitions/gorm.DeletedAt'
      id:
        example: 1
        type: integer
      network:
        example: tron
        type: string
      order_count:
        example: 5
        type: integer
      remark:
        example: 主钱包
        type: string
      source:
        enum:
        - manual
        - import
        example: manual
        type: string
      status:
        description: 状态 1=启用 2=禁用
        enum:
        - 1
        - 2
        example: 1
        type: integer
      updated_at:
        example: "2026-04-16 12:00:00"
        type: string
    type: object
  data.DailyStat:
    properties:
      actual_amount:
        description: sum of actual_amount (token)
        type: number
      day:
        description: '"YYYY-MM-DD" (daily) or "YYYY-MM-DD HH:00" (hourly)'
        type: string
      order_count:
        type: integer
      success_count:
        type: integer
      total_amount:
        description: sum of amount (fiat)
        type: number
    type: object
  data.InitialAdminPasswordHashInfo:
    properties:
      algorithm:
        example: sha256
        type: string
      available:
        example: true
        type: boolean
      password_changed:
        example: false
        type: boolean
      password_hash:
        example: 3f79bb7b435b05321651daefd374cdc9f5f72c467ea3f9f3c5f6e6d7e8f9a0b1
        type: string
    type: object
  gorm.DeletedAt:
    properties:
      time:
        type: string
      valid:
        description: Valid is true if Time is not NULL
        type: boolean
    type: object
  install.InstallRequest:
    properties:
      app_name:
        description: 'Application display name (default: ezpay)'
        example: ezpay
        type: string
      app_uri:
        description: Public base URL of the service, e.g. https://pay.example.com
          (required)
        example: https://pay.example.com
        type: string
      http_bind_addr:
        description: 'Bind address for the HTTP server (default: 127.0.0.1)'
        example: 127.0.0.1
        type: string
      http_bind_port:
        description: 'Bind port for the HTTP server (default: 8000)'
        example: 8000
        type: integer
      log_save_path:
        description: 'Directory for application log files (default: ./logs)'
        example: ./logs
        type: string
      order_expiration_time:
        description: 'Minutes before an unpaid order expires (default: 10)'
        example: 10
        type: integer
      order_notice_max_retry:
        description: 'Maximum webhook retry attempts (default: 1)'
        example: 1
        type: integer
      runtime_root_path:
        description: 'Runtime directory for SQLite DB and temp files (default: ./runtime)'
        example: ./runtime
        type: string
    type: object
  mdb.ApiKey:
    properties:
      call_count:
        example: 342
        type: integer
      created_at:
        example: "2026-04-16 12:00:00"
