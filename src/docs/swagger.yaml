        example: 1
        type: integer
      token:
        example: USDT
        type: string
      trade_id:
        example: T2026041612345678
        type: string
      updated_at:
        example: "2026-04-16 12:00:00"
        type: string
    type: object
  mdb.RpcNode:
    properties:
      api_key:
        example: your-api-key
        type: string
      created_at:
        example: "2026-04-16 12:00:00"
        type: string
      deleted_at:
        $ref: '#/definitions/gorm.DeletedAt'
      enabled:
        example: true
        type: boolean
      id:
        example: 1
        type: integer
      last_checked_at:
        example: "2026-04-16 12:00:00"
