services:
  ezpay:
    image: banezzz/ezpay:local
    restart: always
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - ./docker/ezpay.env:/app/.env:ro
      - ezpay-data:/app/data
    environment:
      - EZPAY_ALLOW_PRIVATE_CALLBACKS=true
    ports:
      - "127.0.0.1:50505:8000"
      - "127.0.0.1:50506:8001"
    networks:
      - default
      - new-api-network

volumes:
  ezpay-data:

networks:
  new-api-network:
    external: true
    name: new-api_new-api-network
